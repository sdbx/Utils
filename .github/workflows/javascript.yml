name: Test for JavaScript implementations
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test
    runs-on: self-hosted
    container:
      image: buildpack-deps:jammy
    defaults:
      run:
        working-directory: ./test
    steps:
      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        working-directory: ./
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build test maker
        run: gcc -o test_maker test_maker.c

      - name: Build object program
        run: ~/bin/bun build hd.js --compile --outfile hd
        working-directory: ./hd/javascript
      - name: Build host program
        run: ./test_maker .test/hd.test
      - name: Run test
        run: ./test ../hd/javascript/hd
        timeout-minutes: 5
